<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZLab Games Studio</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='black'/%3E%3Ctext x='50%25' y='54%25' text-anchor='middle' dominant-baseline='middle' font-family='Arial' font-size='38' font-weight='700' fill='white'%3EZ%3C/text%3E%3C/svg%3E" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #050505;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      max-width: 900px;
      text-align: center;
      padding: 64px 32px;
      border-radius: 28px;
      background: #111111;
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      color: #ffffff;
      margin-bottom: 36px;
      letter-spacing: 1px;
    }

    h1 {
      font-size: 64px;
      line-height: 1.05;
      margin-bottom: 32px;
      color: #ffffff;
    }

    h1 span {
      color: #ffffff;
    }

    .keywords {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 36px;
    }

    .keywords span {
      padding: 12px 24px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.28);
      color: #ffffff;
      font-size: 16px;
      font-weight: bold;
      letter-spacing: 0.5px;
    }

    .btn {
      display: inline-block;
      padding: 14px 28px;
      border-radius: 999px;
      background: #ffffff;
      color: #000000;
      text-decoration: none;
      font-weight: bold;
      transition: 0.25s;
      border: 1px solid #ffffff;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 24px rgba(255, 255, 255, 0.25);
    }

    footer {
      margin-top: 48px;
      color: #888888;
      font-size: 14px;
    }

    @media (max-width: 600px) {
      .container {
        padding: 48px 20px;
      }

      h1 {
        font-size: 42px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">ZLAB GAMES STUDIO</div>

    <h1>We Make <span>Puzzle Games</span></h1>

    <div class="keywords">
      <span>Innovative</span>
      <span>Smart</span>
      <span>Fast</span>
      <span>Polished</span>
    </div>

    <a href="mailto:contact@zlabgames.com" class="btn">Contact Us</a>

    <footer>
      © 2026 ZLab Games Studio
    </footer>
  </div>
</body>
</html>
